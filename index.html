<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nicholas McDonald</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0c090f;
      color: #6a4a8a;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      max-width: 560px;
      width: 100%;
    }

    .name-line {
      display: flex;
      align-items: baseline;
    }

    .prompt {
      font-weight: 300;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: #3d2858;
      user-select: none;
      margin-right: 0.5em;
    }

    h1 {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-weight: 500;
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      color: #c0a0e8;
      letter-spacing: -0.01em;
    }

    .cursor {
      display: inline-block;
      font-weight: 300;
      color: #6a4a8a;
      animation: blink 1.1s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .tagline {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-weight: 300;
      font-size: clamp(0.72rem, 1.8vw, 0.88rem);
      color: #3d2858;
      letter-spacing: 0.01em;
    }

    .btn-line {
      display: flex;
      align-items: center;
      margin-top: 0.6rem;
    }

    .btn-prompt {
      font-weight: 300;
      font-size: clamp(0.75rem, 1.8vw, 0.9rem);
      color: #3d2858;
      user-select: none;
    }

    .btn {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-weight: 300;
      font-size: clamp(0.75rem, 1.8vw, 0.9rem);
      text-decoration: none;
      color: #6a4a8a;
      letter-spacing: 0.01em;
      transition: color 0.2s ease;
    }

    .btn::after {
      content: '_';
      display: inline-block;
      animation: blink 1.1s step-end infinite;
      animation-delay: 0.55s;
    }

    .btn-line:hover .btn,
    .btn:hover {
      color: #c0a0e8;
    }

    .btn-line:hover .btn-prompt {
      color: #6a4a8a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="name-line">
      <span class="prompt">$</span>
      <h1>Nicholas McDonald<span class="cursor">|</span></h1>
    </div>
    <div class="tagline">// [ building things ]</div>
    <div class="btn-line">
      <span class="btn-prompt">&gt;&nbsp;</span>
      <a class="btn" href="mailto:nick@mc6.sh">get-in-touch</a>
    </div>
  </div>
</body>
</html>
